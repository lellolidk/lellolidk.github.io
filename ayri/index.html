<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twitch Checker</title>

<style>
body{
background:#0e0e10;
color:white;
font-family:Arial;
padding:40px;
}
input{
padding:10px;
width:250px;
border-radius:8px;
border:none;
}
button{
padding:10px 20px;
background:#9146FF;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
.result{
margin-top:30px;
background:#1f1f23;
padding:20px;
border-radius:12px;
}
.badges img{
height:28px;
margin-right:6px;
vertical-align:middle;
}
</style>
</head>
<body>

<h2>🟣 Twitch Account Checker</h2>

<input id="username" placeholder="Enter Twitch username">
<button onclick="checkUser()">Check</button>

<div id="output"></div>

<script>

const sevenTvBadges = {};

async function getUserData(userName){
    const res = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${userName}`);
    if(!res.ok) return null;
    return await res.json();
}

async function getGlobalBadges(){
    const res = await fetch(`https://api.ivr.fi/v2/twitch/badges/global`);
    return await res.json();
}

async function getUserBadges(userID, login){
    const res = await fetch("https://gql.twitch.tv/gql",{
        method:"POST",
        headers:{ "Client-ID":"kimne78kx3ncx6brgo4mv6wki5h1ko" },
        body: JSON.stringify([{
            operationName:"ViewerCard",
            variables:{
                channelID:userID,
                channelLogin:login,
                hasChannelID:true,
                giftRecipientLogin:login,
                isViewerBadgeCollectionEnabled:true,
                withStandardGifting:true,
                badgeSourceChannelID:userID,
                badgeSourceChannelLogin:login
            },
            extensions:{
                persistedQuery:{
                    version:1,
                    sha256Hash:"80c53fe04c79a6414484104ea573c28d6a8436e031a235fc6908de63f51c74fd"
                }
            }
        }])
    });

    const data = (await res.json())[0]?.data;
    return data?.channelViewer?.earnedBadges || [];
}

/* =========================
   7TV BADGE
========================= */

async function fetch7tvBadge(userid) {
    try {
        let response = await fetch(`https://7tv.io/v3/users/twitch/${userid}`);
        let data = await response.json();
        if (!data.user) return "";

        let SevenTvID = data.user.id;

        response = await fetch(`https://7tv.io/egvault/v1/subscriptions/${SevenTvID}`);
        data = await response.json();
        if (!data.active) return "";

        response = await fetch(`https://7tv.io/v3/gql`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                operationName: 'GetUserCosmetics',
                variables: { id: String(SevenTvID) },
                query: `
                    query GetUserCosmetics($id: ObjectID!) {
                        user(id: $id) {
                            cosmetics {
                                id
                                kind
                                selected
                            }
                        }
                    }
                `
            }),
        });

        let cosmetics = await response.json();

        for (const cosmetic of cosmetics.data.user.cosmetics) {
            if (cosmetic.selected && cosmetic.kind === "BADGE") {
                return `https://cdn.7tv.app/badge/${cosmetic.id}/4x`;
            }
        }

        return "";

    } catch {
        return "";
    }
}

/* =========================
   7TV PAINT
========================= */

async function fetch7tvPaint(userid) {
    try {
        let res = await fetch(`https://7tv.io/v3/users/twitch/${userid}`);
        let data = await res.json();
        if (!data.user) return null;

        let SevenTvID = data.user.id;

        const response = await fetch("https://7tv.io/v3/gql", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                operationName: "User",
                variables: { id: SevenTvID },
                query: `
                    query User($id: ObjectID!) {
                        user(id: $id) {
                            style {
                                paint {
                                    function
                                    color
                                    stops { at color }
                                    repeat
                                    angle
                                    image_url
                                    shadows { x_offset y_offset radius color }
                                }
                            }
                        }
                    }
                `
            })
        });

        const paintData = await response.json();
        return paintData.data?.user?.style?.paint || null;

    } catch {
        return null;
    }
}

function applyPaintStyle(paint) {
    if (!paint) return "";

    let style = "";

    if (paint.function === "LINEAR_GRADIENT") {
        const stops = paint.stops.map(s =>
            `#${(s.color >>> 0).toString(16).padStart(8, '0')} ${s.at*100}%`
        ).join(", ");

        style += `
            background-image: linear-gradient(${paint.angle}deg, ${stops});
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        `;
    }

    if (paint.shadows?.length) {
        const shadows = paint.shadows.map(sh =>
            `drop-shadow(#${(sh.color >>> 0).toString(16).padStart(8, '0')} ${sh.x_offset}px ${sh.y_offset}px ${sh.radius}px)`
        ).join(" ");

        style += `filter:${shadows};`;
    }

    return `display:inline-block;${style}`;
}

/* =========================
   MAIN CHECK
========================= */

async function checkUser(){

    const username = document.getElementById("username").value.trim().toLowerCase();
    const output = document.getElementById("output");

    if(!username){
        output.innerHTML = "Enter username.";
        return;
    }

    output.innerHTML = "Loading...";

    const userData = await getUserData(username);
    if(!userData || !userData.length){
        output.innerHTML = "User not found.";
        return;
    }

    const user = userData[0];
    const created = new Date(user.createdAt).toLocaleString();

    const earnedBadges = await getUserBadges(user.id, user.login);
    const globalBadges = await getGlobalBadges();
    const sevenBadge = await fetch7tvBadge(user.id);
    const paint = await fetch7tvPaint(user.id);

    let badgeHTML = "";

    for(const badge of globalBadges){
        const userBadge = earnedBadges.find(b => b.setID === badge.set_id);
        if(!userBadge) continue;

        const version = badge.versions.find(v => v.id === userBadge.version);
        if(!version) continue;

        badgeHTML += `<img src="${version.image_url_4x}" title="${version.title}" style="height:26px;margin-right:5px;">`;
    }

    if(sevenBadge){
        badgeHTML += `<img src="${sevenBadge}" title="7TV Badge" style="height:26px;margin-right:5px;">`;
    }

    const paintStyle = applyPaintStyle(paint);

    output.innerHTML = `
        <div class="result">
            <h3 style="${paintStyle}">${user.displayName}:123aaa321:${user.displayName}@ok.lellolidk.de</h3>
            <p>📅 Created: ${created}</p>
            <div>${badgeHTML || "No badges"}</div>
        </div>
    `;
}

</script>

</body>
</html>
