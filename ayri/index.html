<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twitch Checker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0e0e10 0%, #18181b 100%);
    color: #efeff1;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

.header {
    text-align: center;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, #9146ff, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

.header p {
    color: #adadb8;
    font-size: 1.1rem;
}

.cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 30px;
    margin-bottom: 30px;
}

.card {
    background: #1f1f23;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid #2f2f35;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 50px rgba(145, 70, 255, 0.2);
}

.card-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card-title .icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #9146ff, #ff6b9d);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    color: #adadb8;
    font-size: 0.9rem;
    font-weight: 500;
}

textarea, input[type="email"] {
    width: 100%;
    padding: 12px 16px;
    background: #0e0e10;
    border: 2px solid #2f2f35;
    border-radius: 12px;
    color: #efeff1;
    font-size: 1rem;
    transition: all 0.3s ease;
    resize: none;
}

textarea:focus, input[type="email"]:focus {
    outline: none;
    border-color: #9146ff;
    background: #18181b;
    box-shadow: 0 0 0 3px rgba(145, 70, 255, 0.1);
}

textarea {
    min-height: 120px;
    font-family: 'Monaco', 'Courier New', monospace;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, #9146ff, #7c3aed);
    color: white;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(145, 70, 255, 0.3);
}

.btn-primary:disabled {
    background: #4a4a52;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.results-container {
    margin-top: 40px;
}

.result {
    background: #1f1f23;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    border: 1px solid #2f2f35;
    animation: slideIn 0.5s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.result h3 {
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: #9146ff;
}

.result p {
    color: #adadb8;
    margin-bottom: 10px;
}

.badges img {
    height: 28px;
    margin-right: 6px;
    vertical-align: middle;
    border-radius: 6px;
    transition: transform 0.2s ease;
}

.badges img:hover {
    transform: scale(1.1);
}

.email-result {
    background: #1f1f23;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    border: 1px solid #2f2f35;
}

.email-result h3 {
    color: #9146ff;
    margin-bottom: 15px;
}

.email-result pre {
    background: #0e0e10;
    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.9rem;
    color: #00ff00;
    border: 1px solid #2f2f35;
}

.status-message {
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 500;
}

.status-success {
    background: rgba(0, 255, 0, 0.1);
    border: 1px solid rgba(0, 255, 0, 0.3);
    color: #00ff00;
}

.status-error {
    background: rgba(255, 0, 0, 0.1);
    border: 1px solid rgba(255, 0, 0, 0.3);
    color: #ff6b6b;
}

.status-loading {
    background: rgba(145, 70, 255, 0.1);
    border: 1px solid rgba(145, 70, 255, 0.3);
    color: #9146ff;
}

.cors-notice {
    background: rgba(255, 193, 7, 0.1);
    border: 1px solid rgba(255, 193, 7, 0.3);
    color: #ffc107;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.cors-notice a {
    color: #9146ff;
    text-decoration: none;
    font-weight: 600;
}

.cors-notice a:hover {
    text-decoration: underline;
}

.curl-container {
    background: #0e0e10;
    border: 1px solid #2f2f35;
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
    position: relative;
}

.curl-container pre {
    color: #00ff00;
    font-family: 'Monaco', 'Courier New', monospace;
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-break: break-all;
}

.copy-button {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #2f2f35;
    color: #efeff1;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s ease;
}

.copy-button:hover {
    background: #3a3a42;
}

.copy-button.copied {
    background: #00ff00;
    color: #0e0e10;
}

.proxy-option {
    background: rgba(145, 70, 255, 0.1);
    border: 1px solid rgba(145, 70, 255, 0.3);
    color: #9146ff;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.proxy-option button {
    margin-top: 10px;
    background: #9146ff;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}

.proxy-option button:hover {
    background: #7c3aed;
}

@media (max-width: 768px) {
    .cards-container {
        grid-template-columns: 1fr;
    }
    
    .header h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🟣 Twitch Account Checker</h1>
        <p>Check Twitch usernames and email availability</p>
    </div>

    <div class="cards-container">
        <div class="card">
            <div class="card-title">
                <div class="icon">👤</div>
                Username Checker
            </div>
            <div class="input-group">
                <label for="username">Enter usernames (one per line)</label>
                <textarea id="username" placeholder="ninja&#10;shroud&#10;pokimane"></textarea>
            </div>
            <button id="checkUsernamesBtn" class="btn btn-primary" onclick="checkUser()">
                <span>Check Usernames</span>
            </button>
        </div>

        <div class="card">
            <div class="card-title">
                <div class="icon">📧</div>
                Email Checker
            </div>
            <div class="input-group">
                <label for="email">Enter email address</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
            <button id="checkEmailBtn" class="btn btn-primary" onclick="checkEmail()">
                <span>Check Email</span>
            </button>
        </div>
    </div>

    <div id="output" class="results-container"></div>
</div>

<script>

// Simpler username checking based on your original code
async function getUserData(userName){
    try {
        const res = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${userName}`);
        if(!res.ok) return null;
        return await res.json();
    } catch (error) {
        console.error('Error fetching user data:', error);
        return null;
    }
}

async function getGlobalBadges(){
    try {
        const res = await fetch(`https://api.ivr.fi/v2/twitch/badges/global`);
        return await res.json();
    } catch (error) {
        console.error('Error fetching global badges:', error);
        return [];
    }
}

async function getUserBadges(userID, login){
    try {
        const res = await fetch("https://gql.twitch.tv/gql",{
            method:"POST",
            headers:{ "Client-ID":"kimne78kx3ncx6brgo4mv6wki5h1ko" },
            body: JSON.stringify([{
                operationName:"ViewerCard",
                variables:{
                    channelID:userID,
                    channelLogin:login,
                    hasChannelID:true,
                    giftRecipientLogin:login,
                    isViewerBadgeCollectionEnabled:true,
                    withStandardGifting:true,
                    badgeSourceChannelID:userID,
                    badgeSourceChannelLogin:login
                },
                extensions:{
                    persistedQuery:{
                        version:1,
                        sha256Hash:"80c53fe04c79a6414484104ea573c28d6a8436e031a235fc6908de63f51c74fd"
                    }
                }
            }])
        });

        const data = (await res.json())[0]?.data;
        return data?.channelViewer?.earnedBadges || [];
    } catch (error) {
        console.error('Error fetching user badges:', error);
        return [];
    }
}

async function fetch7tvBadge(userid) {
    try {
        let response = await fetch(`https://7tv.io/v3/users/twitch/${userid}`);
        let data = await response.json();
        if (!data.user) return "";

        let SevenTvID = data.user.id;

        response = await fetch(`https://7tv.io/egvault/v1/subscriptions/${SevenTvID}`);
        data = await response.json();
        if (!data.active) return "";

        response = await fetch(`https://7tv.io/v3/gql`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                operationName: 'GetUserCosmetics',
                variables: { id: String(SevenTvID) },
                query: `
                    query GetUserCosmetics($id: ObjectID!) {
                        user(id: $id) {
                            cosmetics {
                                id
                                kind
                                selected
                            }
                        }
                    }
                `
            }),
        });

        let cosmetics = await response.json();

        for (const cosmetic of cosmetics.data.user.cosmetics) {
            if (cosmetic.selected && cosmetic.kind === "BADGE") {
                return `https://cdn.7tv.app/badge/${cosmetic.id}/4x`;
            }
        }

        return "";

    } catch (error) {
        console.error('Error fetching 7TV badge:', error);
        return "";
    }
}

// Email checking with exact headers from your request
async function checkEmailRequest(email) {
    try {
        const response = await fetch("https://passport.twitch.tv/api/v1/usernames/forgot", {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Accept-Encoding": "deflate, gzip",
                "Content-Type": "application/json",
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36",
                "Host": "passport.twitch.tv"
            },
            body: JSON.stringify({
                "email": email,
                "device_id": "HWkL7rPCjuSKvgLn3gB8v4rsKnSJzTgz",
                "client_id": "kimne78kx3ncx6brgo4mv6wki5h1ko",
                "arkose": {"token": ""}
            })
        });
        
        if (!response.ok) {
            throw new Error(`Request failed with status: ${response.status}`);
        }
        
        const data = await response.json();
        return { success: true, data };
    } catch (error) {
        return { success: false, error: error.message };
    }
}

function generateCurlCommand(email) {
    const requestBody = {
        "email": email,
        "device_id": "HWkL7rPCjuSKvgLn3gB8v4rsKnSJzTgz",
        "client_id": "kimne78kx3ncx6brgo4mv6wki5h1ko",
        "arkose": {"token": ""}
    };
    
    return `curl -X POST "https://passport.twitch.tv/api/v1/usernames/forgot" \\
-H "Accept: application/json" \\
-H "Accept-Encoding: deflate, gzip" \\
-H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36" \\
-H "Host: passport.twitch.tv" \\
-H "Content-Type: application/json" \\
-d '${JSON.stringify(requestBody)}'`;
}

function copyToClipboard(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    return true;
}

// Simplified username checking function
async function checkUser(){
    const input = document.getElementById("username").value.trim();
    const output = document.getElementById("output");
    const button = document.getElementById('checkUsernamesBtn');

    if(!input){
        output.innerHTML = '<div class="status-message status-error">Enter at least one username.</div>';
        return;
    }

    // Disable button and show loading
    button.disabled = true;
    button.innerHTML = '<span class="loading"></span> Checking...';
    output.innerHTML = '<div class="status-message status-loading">Loading...</div>';

    const usernames = input
        .split("\n")
        .map(u => u.trim().toLowerCase().split(":")[0])
        .filter(u => u.length > 0);

    let finalHTML = "";

    for(const username of usernames){
        try {
            const userData = await getUserData(username);

            if(!userData || !userData.length){
                finalHTML += `<div class="result">❌ ${username} - User not found</div>`;
                continue;
            }

            const user = userData[0];
            const created = new Date(user.createdAt).toLocaleString();

            const earnedBadges = await getUserBadges(user.id, user.login);
            const globalBadges = await getGlobalBadges();
            const sevenBadge = await fetch7tvBadge(user.id);

            let badgeHTML = "";

            for(const badge of globalBadges){
                const userBadge = earnedBadges.find(b => b.setID === badge.set_id);
                if(!userBadge) continue;

                const version = badge.versions.find(v => v.id === userBadge.version);
                if(!version) continue;

                badgeHTML += `<img src="${version.image_url_4x}" title="${version.title}">`;
            }

            if(sevenBadge){
                badgeHTML += `<img src="${sevenBadge}" title="7TV Badge">`;
            }

            finalHTML += `
                <div class="result">
                    <h3>${user.displayName}</h3>
                    <p>📅 Created: ${created}</p>
                    <div class="badges">${badgeHTML || "No badges"}</div>
                </div>
            `;
        } catch (error) {
            finalHTML += `<div class="result">❌ ${username} - Error: ${error.message}</div>`;
        }
    }

    output.innerHTML = finalHTML;
    button.disabled = false;
    button.innerHTML = '<span>Check Usernames</span>';
}

// Email checking function
async function checkEmail() {
    const emailInput = document.getElementById("email").value.trim();
    const output = document.getElementById("output");
    const button = document.getElementById('checkEmailBtn');

    if(!emailInput){
        output.innerHTML = '<div class="status-message status-error">Please enter an email address</div>';
        return;
    }

    if(!emailInput.includes("@")){
        output.innerHTML = '<div class="status-message status-error">Please enter a valid email address</div>';
        return;
    }

    // Disable button and show loading
    button.disabled = true;
    button.innerHTML = '<span class="loading"></span> Checking...';
    output.innerHTML = '<div class="status-message status-loading">Checking email...</div>';

    try {
        const result = await checkEmailRequest(emailInput);
        
        if (result.success) {
            const emailResultHTML = `
                <div class="email-result">
                    <h3>📧 Email Check Result: ${emailInput}</h3>
                    <div class="status-message status-success">✅ Request sent successfully</div>
                    <pre>${JSON.stringify(result.data, null, 2)}</pre>
                </div>
            `;
            
            output.innerHTML = emailResultHTML;
        } else {
            // CORS error or other network error
            const curlCommand = generateCurlCommand(emailInput);
            
            const emailResultHTML = `
                <div class="email-result">
                    <h3>📧 Email Check Result: ${emailInput}</h3>
                    <div class="cors-notice">
                        ⚠️ Direct browser request failed due to CORS restrictions. 
                        <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS" target="_blank">Learn more about CORS</a>.
                        <br><br>
                        You can test this request using the cURL command below or a tool like Postman:
                    </div>
                    <div class="curl-container">
                        <button class="copy-button" onclick="this.classList.add('copied'); this.textContent='Copied!'; copyToClipboard(\`${curlCommand.replace(/`/g, '\\`')}\`); setTimeout(() => {this.classList.remove('copied'); this.textContent='Copy';}, 2000);">Copy</button>
                        <pre>${curlCommand}</pre>
                    </div>
                </div>
            `;
            
            output.innerHTML = emailResultHTML;
        }
    } catch (error) {
        const emailResultHTML = `
            <div class="email-result">
                <h3>📧 Email Check Result: ${emailInput}</h3>
                <div class="status-message status-error">❌ Error: ${error.message}</div>
            </div>
        `;
        
        output.innerHTML = emailResultHTML;
    }

    button.disabled = false;
    button.innerHTML = '<span>Check Email</span>';
}

// Allow Enter key to trigger checks
document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) {
        checkUser();
    }
});

document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        checkEmail();
    }
});
</script>

</body>
</html>
